<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Personal Academic Website</title>
</head>
<body>
  <header>
    <h1>Welcome to My Personal Academic Website</h1>
  </header>
  <div id="canvas-container"></div>
  <div id="speech-recognition">
    <p id="speech-text"></p>
    <button id="start-listening">Start Listening</button>
    <button id="stop-listening">Stop Listening</button>
  </div>  
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <div id="particles-js"></div>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <a-scene embedded arjs="sourceType: webcam; trackingMethod: best;">
  <!-- AR content goes here -->
  </a-scene>

  <model-viewer
  src="https://poly.googleapis.com/downloads/fp/1609304009663315/aMk_NvAmKgh/3v5cG1ieA8J/CesiumMilkTruck.gltf"
  alt="A 3D model"
  auto-rotate
  camera-controls
></model-viewer>
  <script src="script.js"></script>
  
</body>
</html>
